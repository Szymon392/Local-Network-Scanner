<!DOCTYPE html>
<!--As the goal of this project is to implement asyncronous network scanner and integrate it with google ADK I decided to
to make a minimalistic frontend - despite that the logic of what i had may seem much it's only 'the core'-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner - Results & AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-200 font-sans p-8">

    <div class="max-w-5xl mx-auto">
        <header class="mb-8 border-b border-slate-700 pb-4 flex justify-between items-end">
            <div>
                <h1 class="text-4xl font-bold text-blue-500 mb-2">Network Discovery Report</h1>
                <p id="status" class="text-yellow-400 animate-pulse font-mono text-sm">Initializing scan sequence...</p>
            </div>
            <a href="scan.html" class="text-slate-500 text-sm hover:text-white underline">New Scan</a>
        </header>

        <div id="chatSection" class="mb-8 bg-slate-800 rounded-xl shadow-lg border border-slate-700 overflow-hidden opacity-50 pointer-events-none transition-all duration-500">
            <div class="bg-slate-700 p-3 border-b border-slate-600 flex items-center gap-3">
                <h2 class="text-lg font-bold text-white">AI Network Assistant</h2>
            </div>
            
            <div class="p-4">
                <div id="aiResponse" class="mb-4 p-4 bg-slate-900 rounded-lg border border-slate-700 text-slate-300 min-h-[50px] hidden text-sm leading-relaxed shadow-inner"></div>

                <div class="flex gap-3">
                    <textarea id="chatInput" 
                        class="flex-1 bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all resize-none placeholder:text-slate-500"
                        placeholder="E.g., Which devices are most vulnerable?"
                        rows="1"></textarea>
                    <button id="askBtn" class="bg-blue-600 hover:bg-blue-500 text-white font-bold px-6 py-2 rounded-lg shadow transition-all active:scale-95 flex items-center justify-center disabled:bg-slate-700 text-sm">
                        Ask AI
                    </button>
                </div>
            </div>
        </div>

        <div class="bg-slate-800 rounded-xl shadow-2xl overflow-hidden border border-slate-700 mb-12">
            <table class="w-full text-left border-collapse">
                <thead class="bg-slate-700 text-slate-300 text-sm uppercase tracking-wider">
                    <tr>
                        <th class="p-4">IP Address</th>
                        <th class="p-4">MAC Address</th>
                        <th class="p-4">Vendor</th>
                        <th class="p-4">Name (DNS)</th>
                        <th class="p-4">OS / System</th>
                        <th class="p-4">Open Ports</th>
                    </tr>
                </thead>
                <tbody id="resultsTable" class="divide-y divide-slate-700">
                    </tbody>
            </table>
        </div>
    </div>

<script>
        const statusText = document.getElementById('status');
        const tableBody = document.getElementById('resultsTable');
        const chatSection = document.getElementById('chatSection');
        const askBtn = document.getElementById('askBtn');
        const chatInput = document.getElementById('chatInput');
        const aiResponse = document.getElementById('aiResponse');
        
        window.onload = async () => {
            statusText.innerHTML = '<span class="text-blue-400 animate-pulse">Scanning the network... it may take some time...</span>';
            
            try {
                const response = await fetch('/api/scan');
                if (!response.ok) throw new Error(`Server returned ${response.status}`);
                const hosts = await response.json();

                hosts.forEach(host => {
                    let portsHtml = '<span class="text-slate-500">None</span>';
                    if (host.open_ports && host.open_ports.length > 0) {
                        portsHtml = host.open_ports.map(p => {
                            const portNum = p.number || p; 
                            const portSvc = p.service || '?';
                            const portBanner = p.banner ? p.banner.trim() : ''; 

                            if (portBanner) {
                                return `
                                    <span class="inline-flex items-center gap-1 bg-slate-900 px-2 py-1 rounded border border-blue-500 cursor-help transition-colors hover:bg-slate-800" title="${portBanner}">
                                        <span class="text-blue-400 text-xs font-bold">${portNum}</span>
                                        <span class="text-slate-400 text-[10px] uppercase">${portSvc}</span>
                                    </span>`;
                            } else {
                                return `
                                    <span class="inline-flex items-center gap-1 bg-slate-900 px-2 py-1 rounded border border-slate-700">
                                        <span class="text-blue-400 text-xs font-bold">${portNum}</span>
                                        <span class="text-slate-500 text-[10px] uppercase">${portSvc}</span>
                                    </span>`;
                            }
                        }).join(' ');
                    }

                    const row = document.createElement('tr');
                    row.className = 'hover:bg-slate-750 transition-colors duration-150';
                    row.innerHTML = `
                        <td class="p-4 font-mono text-blue-400 font-semibold">${host.ip}</td>
                        <td class="p-4 font-mono text-slate-400 text-sm">${host.mac || '-'}</td>
                        <td class="p-4 text-slate-200 truncate max-w-[150px]" title="${host.vendor || '-'}">${host.vendor || '-'}</td>
                        <td class="p-4 text-slate-200">${host.local_name || '-'}</td>
                        <td class="p-4 text-blue-400 text-sm">${host.os || 'Unknown'}</td>
                        <td class="p-4 space-x-1">${portsHtml}</td>
                    `;
                    tableBody.appendChild(row);
                });

                statusText.innerHTML = `<span class="text-blue-400">Scan complete. Found ${hosts.length} devices.</span>`;
                
                chatSection.classList.remove('opacity-50', 'pointer-events-none');

            } catch (error) {
                statusText.innerHTML = `<span class="text-red-500">Error occurred: ${error.message}</span>`;
            }
        };

        const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsUrl = `${wsProtocol}//${window.location.host}/ws/chat`;
        let aiSocket = new WebSocket(wsUrl);

        aiSocket.onmessage = (event) => {
            const answer = event.data;
            aiResponse.innerHTML = `<div class="text-blue-400 font-bold text-[10px] uppercase mb-1">AI Analyst:</div><div class="text-slate-300 text-sm">${answer}</div>`;
            askBtn.disabled = false;
        };

        aiSocket.onclose = () => {
            aiResponse.classList.remove('hidden');
            aiResponse.innerHTML = `<span class="text-red-500 text-xs italic">System disconnected from AI Engine. Refresh page to reconnect.</span>`;
            askBtn.disabled = true;
        };

        askBtn.addEventListener('click', () => {
            const question = chatInput.value.trim();
            if (!question) return;

            if (aiSocket.readyState === WebSocket.OPEN) {
                askBtn.disabled = true;
                aiResponse.classList.remove('hidden');
                aiResponse.innerHTML = '<span class="text-blue-400 animate-pulse font-mono text-xs uppercase tracking-widest">Thinking...</span>';

                aiSocket.send(question);
                chatInput.value = '';
            } else {
                alert("Connection to AI is currently down.");
            }
        });

        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                askBtn.click();
            }
        });
    </script>
</body>
</html>
